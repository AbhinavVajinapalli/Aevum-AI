services:
  - type: web
    name: aevum-ai-backend
    runtime: python
    runtimeVersion: 3.12.0
    buildCommand: python -m pip install --upgrade pip setuptools wheel && python -m pip install --prefer-binary -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: '["https://aevum-ai-one.vercel.app", "https://aevum-ai.vercel.app", "http://localhost:3000"]'
      - key: ALLOW_DEMO_MODE
        value: "True"
