<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f1724"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="40" fill="url(#grad)" />

  <!-- Stylized initials: A with diagonal cut and accent bar -->
    <g filter="url(#softShadow)">
      <!-- Main monogram shape with light outline to separate from dark background -->
      <path d="M110 300 L170 120 L230 120 L290 300 L250 300 L234 250 L166 250 L150 300 Z"
        fill="#0f1724" opacity="0.95"
        stroke="#dbeafe" stroke-width="8" stroke-linejoin="round" paint-order="stroke fill"/>
      <!-- Accent bar (keeps its vibrant gradient) -->
      <path d="M150 220 L190 140 L210 140 L250 220 L150 220 Z"
        fill="url(#acc)" opacity="0.95" transform="translate(-2,0)"/>
      <!-- Small triangle with subtle stroke to prevent blending -->
      <path d="M175 175 L225 175 L200 230 Z"
        fill="#071126" opacity="0.9"
        stroke="#93c5fd" stroke-width="3" stroke-linejoin="round" paint-order="stroke fill"/>
    </g>

  <!-- Small 'AI' label -->
  <text x="50%" y="82%" font-size="28" font-family="Inter, Segoe UI, Roboto, Arial, sans-serif" fill="#dbeafe" text-anchor="middle" letter-spacing="1">Aevum AI</text>
</svg>
